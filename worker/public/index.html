<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nehan.ai — ライフログ日報システム</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:title" content="nehan.ai">
  <meta property="og:description" content="位置情報・睡眠・ヘルスデータを自動記録し、毎日の日報を生成するライフログアプリ">
  <meta property="og:image" content="/og-image.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0014;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Hero */
    .hero {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(180deg, #4B0082 0%, #1a0033 60%, #0a0014 100%);
    }
    .logo {
      font-size: 7rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 0.25rem;
    }
    .hero h1 {
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }
    .hero .tagline {
      font-size: 1.15rem;
      opacity: 0.75;
      font-weight: 300;
      max-width: 480px;
      line-height: 1.6;
    }
    .app-store-badge {
      margin-top: 2rem;
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      color: #fff;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .app-store-badge:hover { background: rgba(255,255,255,0.2); }

    /* Features */
    .features {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }
    .feature {
      background: rgba(75, 0, 130, 0.15);
      border: 1px solid rgba(75, 0, 130, 0.3);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .feature .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .feature h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .feature p { font-size: 0.9rem; opacity: 0.7; line-height: 1.6; }

    /* Footer */
    footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
    }
    footer a { color: rgba(255,255,255,0.65); text-decoration: none; margin: 0 0.75rem; }
    footer a:hover { color: #fff; }
    footer .links { margin-bottom: 0.75rem; }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="logo">N</div>
    <h1>nehan.ai</h1>
    <p class="tagline">位置情報・睡眠・ヘルスデータを自動で記録し、<br>毎日の日報を自動生成するライフログアプリ</p>
    <a class="app-store-badge" href="#">App Store — Coming Soon</a>
  </section>

  <!-- Features -->
  <section class="features">
    <div class="feature">
      <div class="icon">📍</div>
      <h3>位置情報の自動記録</h3>
      <p>バックグラウンドで訪問場所を記録。地名も自動で取得し、行動ログを作成します。</p>
    </div>
    <div class="feature">
      <div class="icon">🛏️</div>
      <h3>睡眠分析</h3>
      <p>HealthKitと連携し、deep・REM・core・awakeの睡眠ステージを自動取得します。</p>
    </div>
    <div class="feature">
      <div class="icon">📊</div>
      <h3>日報の自動生成</h3>
      <p>毎日23:00に一日のデータをまとめてGitHub Issueとして日報を作成。Discordにも通知します。</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="links">
      <a href="/privacy">プライバシーポリシー</a>
      <a href="/terms">利用規約</a>
    </div>
    <div>&copy; 2026 AICU Inc.</div>
  </footer>

</body>
</html>
